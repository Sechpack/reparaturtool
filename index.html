<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reparaturbericht</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 16px;
    }
    h1 { font-size: 1.3rem; margin-bottom: 16px; color: #4fc3f7; text-align: center; }

    #status {
      display: flex; align-items: center; gap: 8px;
      background: #16213e; border-radius: 8px;
      padding: 10px 14px; margin-bottom: 14px; font-size: 0.85rem;
    }
    #statusDot { width: 10px; height: 10px; border-radius: 50%; background: #555; flex-shrink: 0; }
    #statusDot.connected { background: #4caf50; }
    #statusDot.typing    { background: #ff9800; }
    #statusDot.error     { background: #f44336; }

    textarea {
      width: 100%; height: 130px;
      background: #16213e; border: 1px solid #333; border-radius: 10px;
      color: #eee; font-size: 1rem; padding: 12px; resize: vertical; outline: none;
    }
    textarea:focus { border-color: #4fc3f7; }

    .btn-row { display: flex; gap: 10px; margin-top: 10px; }
    button {
      flex: 1; padding: 13px 8px; border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity .15s, transform .1s;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: default; }

    #btnMic    { background: #e91e63; color: #fff; }
    #btnMic.recording { background: #ff5252; animation: pulse 1s infinite; }
    #btnFormat { background: #4fc3f7; color: #1a1a2e; }
    #btnBle    { background: #4caf50; color: #fff; }
    #btnSend   { background: #ff9800; color: #fff; }
    #btnLoadAI { background: #9c27b0; color: #fff; width: 100%; margin-bottom: 14px; }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .6; } }

    #preview {
      background: #16213e; border: 1px solid #333; border-radius: 10px;
      padding: 12px; margin-top: 14px; font-size: 0.9rem; white-space: pre-wrap;
      min-height: 60px; color: #b0e0ff; display: none;
    }
    #preview.visible { display: block; }

    /* Modell-Lade-Box */
    #aiBox {
      background: #16213e; border-radius: 10px; padding: 12px; margin-bottom: 14px;
    }
    #aiInfo { font-size: 0.8rem; color: #888; margin-bottom: 8px; }
    #aiProgress {
      font-size: 0.8rem; color: #ce93d8; margin-top: 8px; display: none;
    }
    #progBar {
      width: 100%; height: 6px; background: #0f3460; border-radius: 3px;
      margin-top: 6px; overflow: hidden; display: none;
    }
    #progFill { height: 100%; width: 0%; background: #9c27b0; transition: width .3s; }
  </style>
</head>
<body>
  <h1>Reparaturbericht-Tool</h1>

  <!-- KI laden -->
  <div id="aiBox">
    <div id="aiInfo">KI läuft komplett auf deinem Handy — kein Internet nötig (nach dem ersten Laden). Erster Download ca. 1 GB, am besten im WLAN.</div>
    <button id="btnLoadAI">🧠 KI laden</button>
    <div id="aiProgress">Lädt...</div>
    <div id="progBar"><div id="progFill"></div></div>
  </div>

  <!-- Status -->
  <div id="status">
    <div id="statusDot"></div>
    <span id="statusText">Nicht verbunden</span>
  </div>

  <!-- Texteingabe -->
  <textarea id="input" placeholder="Fehler, Ursache und Maßnahmen beschreiben... (oder Mikrofon nutzen)"></textarea>

  <div class="btn-row">
    <button id="btnMic">🎙 Sprechen</button>
    <button id="btnFormat" disabled>✨ Formatieren</button>
  </div>

  <div id="preview"></div>

  <div class="btn-row" style="margin-top:10px">
    <button id="btnBle">📡 BLE verbinden</button>
    <button id="btnSend" disabled>📤 Senden</button>
  </div>

<script type="module">
import * as webllm from "https://esm.run/@mlc-ai/web-llm";

// ── Konstanten ──────────────────────────────────────────────────────────────
const SERVICE_UUID   = "12345678-1234-1234-1234-123456789abc";
const CHAR_TEXT_UUID = "12345678-1234-1234-1234-123456789abd";
const CHAR_STAT_UUID = "12345678-1234-1234-1234-123456789abe";

const MODEL_ID = "Qwen2.5-1.5B-Instruct-q4f16_1-MLC";  // ~1 GB, läuft stabil auf Handy-GPU

const SYSTEM_PROMPT = `Du bist ein Assistent für Techniker.
Der Nutzer beschreibt einen Reparaturfall auf Deutsch, oft als Stichworte.
Schreibe daraus einen sauberen Reparaturbericht in genau diesem Format:

REPARATURBERICHT
================
Datum: {DATUM}
Fehler/Symptom:
[Beschreibung]

Ursache:
[Ursache]

Durchgeführte Maßnahmen:
[Maßnahmen]

Ergebnis:
[Ergebnis]
================

Schreibe NUR den Bericht, keinen weiteren Text. Erfinde nichts dazu.`;

// ── State ───────────────────────────────────────────────────────────────────
let engine       = null;
let aiReady      = false;
let bleDevice    = null;
let textChar     = null;
let statusChar   = null;
let formattedText = "";
let recognition  = null;
let isRecording  = false;

// ── DOM ─────────────────────────────────────────────────────────────────────
const inputEl    = document.getElementById("input");
const previewEl  = document.getElementById("preview");
const btnLoadAI  = document.getElementById("btnLoadAI");
const aiProgress = document.getElementById("aiProgress");
const progBar    = document.getElementById("progBar");
const progFill   = document.getElementById("progFill");
const btnMic     = document.getElementById("btnMic");
const btnFormat  = document.getElementById("btnFormat");
const btnBle     = document.getElementById("btnBle");
const btnSend    = document.getElementById("btnSend");
const statusDot  = document.getElementById("statusDot");
const statusText = document.getElementById("statusText");

function setStatus(text, cls = "") { statusText.textContent = text; statusDot.className = cls; }
function updateFormatBtn() {
  btnFormat.disabled = !(aiReady && inputEl.value.trim().length >= 5);
}
inputEl.addEventListener("input", updateFormatBtn);

// ── KI laden ─────────────────────────────────────────────────────────────────
btnLoadAI.addEventListener("click", async () => {
  if (aiReady) return;
  btnLoadAI.disabled = true;
  aiProgress.style.display = "block";
  progBar.style.display = "block";

  try {
    engine = await webllm.CreateMLCEngine(MODEL_ID, {
      initProgressCallback: (p) => {
        aiProgress.textContent = p.text;
        if (typeof p.progress === "number") {
          progFill.style.width = Math.round(p.progress * 100) + "%";
        }
      }
    });
    aiReady = true;
    btnLoadAI.textContent = "✅ KI bereit";
    aiProgress.textContent = "KI geladen — bereit.";
    progFill.style.width = "100%";
    updateFormatBtn();
  } catch (e) {
    aiProgress.textContent = "Fehler beim Laden: " + e.message;
    btnLoadAI.disabled = false;
    if (String(e.message).includes("WebGPU")) {
      aiProgress.textContent = "Dein Browser unterstützt WebGPU nicht. Nutze aktuelles Chrome auf Android.";
    }
  }
});

// ── Spracheingabe ─────────────────────────────────────────────────────────────
btnMic.addEventListener("click", () => {
  if (!("webkitSpeechRecognition" in window) && !("SpeechRecognition" in window)) {
    alert("Spracheingabe wird in diesem Browser nicht unterstützt.\nNutze Chrome.");
    return;
  }
  if (isRecording) { recognition && recognition.stop(); return; }

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = "de-DE";
  recognition.continuous = true;
  recognition.interimResults = false;

  recognition.onstart  = () => { isRecording = true;  btnMic.textContent = "⏹ Stopp"; btnMic.classList.add("recording"); };
  recognition.onend    = () => { isRecording = false; btnMic.textContent = "🎙 Sprechen"; btnMic.classList.remove("recording"); };
  recognition.onresult = e => {
    inputEl.value = Array.from(e.results).map(r => r[0].transcript).join(" ");
    updateFormatBtn();
  };
  recognition.onerror  = err => setStatus("Mikrofon-Fehler: " + err.error, "error");
  recognition.start();
});

// ── Formatieren (lokale KI) ───────────────────────────────────────────────────
btnFormat.addEventListener("click", async () => {
  if (!aiReady) return;
  const userText = inputEl.value.trim();
  if (!userText) return;

  btnFormat.disabled = true;
  btnFormat.textContent = "⏳ Schreibt...";
  setStatus("KI formatiert...", "typing");

  try {
    const today = new Date().toLocaleDateString("de-DE", { day:"2-digit", month:"2-digit", year:"numeric" });
    const system = SYSTEM_PROMPT.replace("{DATUM}", today);

    const req = {
      temperature: 0.3,
      max_tokens: 600,
      messages: [
        { role: "system", content: system },
        { role: "user",   content: userText }
      ]
    };

    let reply;
    try {
      reply = await engine.chat.completions.create(req);
    } catch (err) {
      // Manche Handys verlieren das geladene Modell — dann neu laden und nochmal
      if (String(err.message).toLowerCase().includes("not loaded")) {
        setStatus("Lade Modell neu...", "typing");
        await engine.reload(MODEL_ID);
        reply = await engine.chat.completions.create(req);
      } else {
        throw err;
      }
    }

    formattedText = reply.choices[0].message.content.trim();
    previewEl.textContent = formattedText;
    previewEl.classList.add("visible");
    btnSend.disabled = !bleDevice;
    setStatus("Bericht fertig ✓", bleDevice ? "connected" : "");
  } catch (e) {
    setStatus("Fehler: " + e.message, "error");
  } finally {
    btnFormat.textContent = "✨ Formatieren";
    updateFormatBtn();
  }
});

// ── BLE ───────────────────────────────────────────────────────────────────────
btnBle.addEventListener("click", async () => {
  if (bleDevice && bleDevice.gatt.connected) { bleDevice.gatt.disconnect(); return; }
  if (!navigator.bluetooth) {
    alert("Web Bluetooth wird nicht unterstützt.\nNutze Chrome auf Android.");
    return;
  }
  setStatus("Suche ESP...", "");
  try {
    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [{ name: "ESP-Reparaturtool" }],
      optionalServices: [SERVICE_UUID]
    });
    bleDevice.addEventListener("gattserverdisconnected", () => {
      setStatus("BLE getrennt", "error");
      btnBle.textContent = "📡 BLE verbinden";
      btnSend.disabled = true;
    });
    const server  = await bleDevice.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    textChar      = await service.getCharacteristic(CHAR_TEXT_UUID);
    statusChar    = await service.getCharacteristic(CHAR_STAT_UUID);

    await statusChar.startNotifications();
    statusChar.addEventListener("characteristicvaluechanged", e => {
      const val = new TextDecoder().decode(e.target.value);
      const msgs = { READY:"Bereit — Button drücken", TYPING:"ESP tippt...", DONE:"Erledigt ✓", NO_TEXT:"Kein Text auf ESP" };
      setStatus(msgs[val] || val, val === "TYPING" ? "typing" : "connected");
    });

    setStatus("Verbunden mit ESP ✓", "connected");
    btnBle.textContent = "❌ Trennen";
    if (formattedText) btnSend.disabled = false;
  } catch (e) {
    setStatus("BLE Fehler: " + e.message, "error");
    bleDevice = null;
  }
});

// ── Senden ────────────────────────────────────────────────────────────────────
btnSend.addEventListener("click", async () => {
  if (!textChar || !formattedText) return;
  btnSend.disabled = true;
  setStatus("Sende an ESP...", "typing");
  try {
    const bytes = new TextEncoder().encode(formattedText);
    const CHUNK = 512;
    for (let i = 0; i < bytes.length; i += CHUNK) {
      await textChar.writeValueWithoutResponse(bytes.slice(i, i + CHUNK));
      await new Promise(r => setTimeout(r, 50));
    }
    setStatus("Gesendet ✓ — Button am ESP drücken", "connected");
  } catch (e) {
    setStatus("Sende-Fehler: " + e.message, "error");
  } finally {
    btnSend.disabled = false;
  }
});
</script>
</body>
</html>
