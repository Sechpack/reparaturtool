<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reparaturbericht</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e; color: #eee; min-height: 100vh; padding: 16px;
    }
    h1 { font-size: 1.3rem; margin-bottom: 6px; color: #4fc3f7; text-align: center; }
    .sub { text-align: center; font-size: 0.78rem; color: #888; margin-bottom: 16px; }

    #status {
      display: flex; align-items: center; gap: 8px;
      background: #16213e; border-radius: 8px;
      padding: 10px 14px; margin-bottom: 14px; font-size: 0.85rem;
    }
    #statusDot { width: 10px; height: 10px; border-radius: 50%; background: #555; flex-shrink: 0; }
    #statusDot.connected { background: #4caf50; }
    #statusDot.typing    { background: #ff9800; }
    #statusDot.error     { background: #f44336; }

    .label { font-size: 0.8rem; color: #4fc3f7; margin: 4px 2px 6px; }

    textarea {
      width: 100%; height: 200px;
      background: #16213e; border: 1px solid #333; border-radius: 10px;
      color: #eee; font-size: 1rem; padding: 12px; resize: vertical; outline: none;
      white-space: pre-wrap;
    }
    textarea:focus { border-color: #4fc3f7; }

    .btn-row { display: flex; gap: 10px; margin-top: 10px; }
    button {
      flex: 1; padding: 13px 8px; border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity .15s, transform .1s;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: default; }

    #btnTemplate { background: #9c27b0; color: #fff; width: 100%; margin-bottom: 14px; }
    #btnPaste  { background: #607d8b; color: #fff; }
    #btnClear  { background: #455a64; color: #fff; }
    #btnBle    { background: #4caf50; color: #fff; }
    #btnSend   { background: #ff9800; color: #fff; }
  </style>
</head>
<body>
  <h1>Reparaturbericht → PC</h1>
  <div class="sub">Bericht aus AI Edge Gallery einfügen und an den ESP senden</div>

  <!-- Vorlage für die Gallery -->
  <button id="btnTemplate">📋 KI-Vorlage kopieren (für AI Edge Gallery)</button>

  <!-- Status -->
  <div id="status">
    <div id="statusDot"></div>
    <span id="statusText">Nicht verbunden</span>
  </div>

  <!-- Bericht einfügen -->
  <div class="label">Fertiger Bericht (hier einfügen):</div>
  <textarea id="report" placeholder="Bericht aus der AI Edge Gallery hier einfügen..."></textarea>

  <div class="btn-row">
    <button id="btnPaste">📥 Einfügen</button>
    <button id="btnClear">🗑 Leeren</button>
  </div>

  <div class="btn-row" style="margin-top:10px">
    <button id="btnBle">📡 BLE verbinden</button>
    <button id="btnSend" disabled>📤 An PC senden</button>
  </div>

<script>
// ── Konstanten ──────────────────────────────────────────────────────────────
const SERVICE_UUID   = "12345678-1234-1234-1234-123456789abc";
const CHAR_TEXT_UUID = "12345678-1234-1234-1234-123456789abd";
const CHAR_STAT_UUID = "12345678-1234-1234-1234-123456789abe";

// Vorlage, die in die AI Edge Gallery kopiert wird
const TEMPLATE =
`Schreibe aus den folgenden Stichworten einen Reparaturbericht in GENAU diesem Format. Schreibe nur den Bericht, sonst nichts:

REPARATURBERICHT
================
Datum: ${new Date().toLocaleDateString("de-DE")}
Fehler/Symptom:
Ursache:
Durchgeführte Maßnahmen:
Ergebnis:
================

Stichworte:
`;

// ── State ───────────────────────────────────────────────────────────────────
let bleDevice  = null;
let textChar   = null;
let statusChar = null;

// ── DOM ─────────────────────────────────────────────────────────────────────
const reportEl   = document.getElementById("report");
const btnTemplate= document.getElementById("btnTemplate");
const btnPaste   = document.getElementById("btnPaste");
const btnClear   = document.getElementById("btnClear");
const btnBle     = document.getElementById("btnBle");
const btnSend    = document.getElementById("btnSend");
const statusDot  = document.getElementById("statusDot");
const statusText = document.getElementById("statusText");

function setStatus(text, cls = "") { statusText.textContent = text; statusDot.className = cls; }
function updateSend() { btnSend.disabled = !(bleDevice && bleDevice.gatt.connected && reportEl.value.trim()); }
reportEl.addEventListener("input", updateSend);

// ── Vorlage kopieren ──────────────────────────────────────────────────────────
btnTemplate.addEventListener("click", async () => {
  try {
    await navigator.clipboard.writeText(TEMPLATE);
    btnTemplate.textContent = "✅ Vorlage kopiert — in Gallery einfügen";
    setTimeout(() => btnTemplate.textContent = "📋 KI-Vorlage kopieren (für AI Edge Gallery)", 2500);
  } catch (e) {
    // Fallback: in das Feld schreiben, damit man es markieren/kopieren kann
    reportEl.value = TEMPLATE;
    alert("Kopieren nicht erlaubt — Vorlage steht jetzt im Feld, dort markieren und kopieren.");
  }
});

// ── Einfügen / Leeren ─────────────────────────────────────────────────────────
btnPaste.addEventListener("click", async () => {
  try {
    const txt = await navigator.clipboard.readText();
    if (txt) { reportEl.value = txt; updateSend(); }
  } catch (e) {
    reportEl.focus();
    setStatus("Bitte manuell einfügen (lange tippen → Einfügen)", "");
  }
});
btnClear.addEventListener("click", () => { reportEl.value = ""; updateSend(); });

// ── BLE ───────────────────────────────────────────────────────────────────────
btnBle.addEventListener("click", async () => {
  if (bleDevice && bleDevice.gatt.connected) { bleDevice.gatt.disconnect(); return; }
  if (!navigator.bluetooth) {
    alert("Web Bluetooth wird nicht unterstützt.\nNutze Chrome auf Android.");
    return;
  }
  setStatus("Suche ESP...", "");
  try {
    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [{ name: "ESP-Reparaturtool" }],
      optionalServices: [SERVICE_UUID]
    });
    bleDevice.addEventListener("gattserverdisconnected", () => {
      setStatus("BLE getrennt", "error");
      btnBle.textContent = "📡 BLE verbinden";
      updateSend();
    });
    const server  = await bleDevice.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    textChar      = await service.getCharacteristic(CHAR_TEXT_UUID);
    statusChar    = await service.getCharacteristic(CHAR_STAT_UUID);

    await statusChar.startNotifications();
    statusChar.addEventListener("characteristicvaluechanged", e => {
      const val = new TextDecoder().decode(e.target.value);
      const msgs = { READY:"Bereit — Button am ESP drücken", TYPING:"ESP tippt...", DONE:"Erledigt ✓", NO_TEXT:"Kein Text auf ESP" };
      setStatus(msgs[val] || val, val === "TYPING" ? "typing" : "connected");
    });

    setStatus("Verbunden mit ESP ✓", "connected");
    btnBle.textContent = "❌ Trennen";
    updateSend();
  } catch (e) {
    setStatus("BLE Fehler: " + e.message, "error");
    bleDevice = null;
  }
});

// ── Senden ────────────────────────────────────────────────────────────────────
btnSend.addEventListener("click", async () => {
  const text = reportEl.value.trim();
  if (!textChar || !text) return;
  btnSend.disabled = true;
  setStatus("Sende an ESP...", "typing");
  try {
    const bytes = new TextEncoder().encode(text);
    const CHUNK = 512;
    for (let i = 0; i < bytes.length; i += CHUNK) {
      await textChar.writeValueWithoutResponse(bytes.slice(i, i + CHUNK));
      await new Promise(r => setTimeout(r, 50));
    }
    setStatus("Gesendet ✓ — Button am ESP drücken", "connected");
  } catch (e) {
    setStatus("Sende-Fehler: " + e.message, "error");
  } finally {
    updateSend();
  }
});
</script>
</body>
</html>
